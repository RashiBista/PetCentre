name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python-version: ['3.10', '3.11']
        project: ['PetCentre_RegistrationSystem', 'final_chat']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: build-pip-${{ matrix.python-version }}-${{ hashFiles(format('**/{0}/requirements.txt', matrix.project)) }}
          restore-keys: |
            build-pip-${{ matrix.python-version }}-

      - name: Debug repo layout
        run: |
          echo "PWD: $(pwd)"
          ls -la || true
          test -f ${{ matrix.project }}/manage.py || { echo "manage.py not found in ${{ matrix.project }}" >&2; exit 1; }
          test -f ${{ matrix.project }}/requirements.txt || { echo "requirements.txt not found in ${{ matrix.project }}" >&2; exit 1; }

      - name: Install Dependencies
        working-directory: ./${{ matrix.project }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        working-directory: ./${{ matrix.project }}
        run: |
          python manage.py test