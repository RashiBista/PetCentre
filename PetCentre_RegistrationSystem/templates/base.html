<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}PetCentre{% endblock %}</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-green-600 text-white px-6 py-4 flex items-center justify-between shadow-md">
    <a href="/" class="text-xl font-bold tracking-tight">🐾 PetCentre</a>
    <div class="flex items-center gap-4 text-sm">
      {% if user.is_authenticated %}
        <a href="{% url 'chat:inbox' %}" class="hover:underline">Messages</a>
        <span class="opacity-75">{{ user.username }}</span>
        <a href="/admin/logout/" class="bg-white text-green-600 px-3 py-1 rounded-full font-medium hover:bg-green-50">Logout</a>
      {% else %}
        <a href="/login/" class="hover:underline">Login</a>
      {% endif %}
    </div>
  </nav>

  <!-- Page content -->
  <main>
    {% block content %}{% endblock %}
  </main>

</body>
</html>
